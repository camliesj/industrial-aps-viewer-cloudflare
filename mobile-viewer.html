<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mobile Model Viewer</title>
<style>
:root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#f8fafc;background:#f7f9fc}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}.shell{display:grid;grid-template-rows:52px 1fr 58px;height:100%;background:#f7f9fc}
.topbar,.bottombar{display:flex;align-items:center;gap:8px;background:#111827;border-color:#243244;color:#fff;padding:8px 10px;z-index:5}.topbar{border-bottom:1px solid #243244}.bottombar{border-top:1px solid #243244;justify-content:space-around}
.title{min-width:0;flex:1}.title strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px}.title span{display:block;color:#9ca3af;font-size:12px;margin-top:2px}
button,a.button{border:1px solid #334155;background:#172033;color:#fff;border-radius:8px;padding:8px 10px;text-decoration:none;font-size:13px}
#viewerHost{position:relative;min-height:0;background:#f7f9fc;touch-action:none}.msg{position:absolute;left:12px;right:12px;top:12px;background:#fff;color:#172033;border-radius:10px;padding:12px;z-index:4;line-height:1.55;box-shadow:0 10px 30px rgba(0,0,0,.22)}
.drawer{position:fixed;left:0;right:0;bottom:58px;max-height:44%;overflow:auto;background:#fff;color:#172033;border-radius:14px 14px 0 0;box-shadow:0 -14px 40px rgba(0,0,0,.35);padding:14px;z-index:10;transform:translateY(110%);transition:transform .2s ease}
.drawer.show{transform:translateY(0)}.drawer h2{font-size:16px;margin:0 0 10px}.drawer dl{margin:0}.drawer div{display:grid;grid-template-columns:38% 1fr;gap:8px;border-top:1px solid #e5e7eb;padding:8px 0}.drawer dt{color:#64748b}.drawer dd{margin:0;word-break:break-word}
.fallback{display:grid;place-items:center;height:100%;padding:16px;background:#111827;color:#172033}.fallback-card{background:#fff;border-radius:12px;padding:16px;max-width:520px;width:100%}.fallback img{display:block;max-width:100%;height:auto;background:#fff;margin-top:12px}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <a class="button" href="/">Back</a>
    <div class="title"><strong id="modelName">Mobile Viewer</strong><span id="modelMeta">Preparing...</span></div>
    <a class="button" href="/mobile-diagnostics">Diagnostics</a>
  </header>
  <section id="viewerHost"><div class="msg" id="message">Loading mobile Viewer...</div></section>
  <nav class="bottombar">
    <button type="button" id="fitBtn">Fit</button>
    <button type="button" id="propBtn">Properties</button>
    <button type="button" id="shareBtn">Share</button>
  </nav>
</main>
<aside class="drawer" id="drawer"><h2>Properties</h2><p id="propHint">Select a component to view properties.</p><dl id="props"></dl></aside>
<script>
const VIEWER_VERSION="7.*";
const params=new URLSearchParams(location.search);
const modelId=params.get("id");
let viewer=null;
let currentModel=null;
let selectedProperties=[];
const $=id=>document.getElementById(id);

boot().catch(error=>{
  console.error(error);
  showMessage(error.message||"Mobile Viewer failed to open.");
  if(currentModel) showFallback(currentModel,error.message);
});

async function boot(){
  if(!modelId) throw new Error("Missing model ID.");
  const modelPayload=await fetchJson(`/api/models/${encodeURIComponent(modelId)}`);
  currentModel=modelPayload.model;
  $("modelName").textContent=currentModel.name||"Model Viewer";
  $("modelMeta").textContent=`${currentModel.status||"-"} / ${currentModel.progress||"-"}`;
  if(!currentModel.urn) throw new Error("The model has not finished conversion yet.");
  if(!supportsWebGL()) throw new Error("This browser does not support WebGL.");
  await loadViewerAssets();
  const token=await fetchJson("/api/auth/token");
  await openViewer(currentModel.urn,token.access_token);
}

async function fetchJson(url){
  const response=await fetch(url);
  const payload=await response.json().catch(()=>({}));
  if(!response.ok) throw new Error(payload.error||`Request failed: ${response.status}`);
  return payload;
}

function supportsWebGL(){
  try{
    const canvas=document.createElement("canvas");
    return Boolean(canvas.getContext("webgl2")||canvas.getContext("webgl"));
  }catch{return false}
}

function loadViewerAssets(){
  if(window.Autodesk?.Viewing) return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const link=document.createElement("link");
    link.rel="stylesheet";
    link.href=`https://developer.api.autodesk.com/modelderivative/v2/viewers/${VIEWER_VERSION}/style.min.css`;
    document.head.appendChild(link);
    const script=document.createElement("script");
    script.src=`https://developer.api.autodesk.com/modelderivative/v2/viewers/${VIEWER_VERSION}/viewer3D.min.js`;
    script.onload=resolve;
    script.onerror=()=>reject(new Error("Autodesk Viewer CDN failed to load."));
    document.body.appendChild(script);
  });
}

function openViewer(urn,accessToken){
  return new Promise((resolve,reject)=>{
    Autodesk.Viewing.Initializer({env:"AutodeskProduction2",api:"streamingV2",accessToken},()=>{
      const host=$("viewerHost");
      viewer=new Autodesk.Viewing.GuiViewer3D(host,{extensions:[]});
      const started=viewer.start();
      if(started>0){
        reject(new Error(`Viewer initialization failed: ${started}`));
        return;
      }
      applyMobileQuality(viewer);
      requestAnimationFrame(()=>viewer.resize());
      Autodesk.Viewing.Document.load(`urn:${urn}`,doc=>{
        const node=selectViewableNode(doc.getRoot());
        if(!node){
          reject(new Error("No 2D or 3D viewable was found."));
          return;
        }
        const role=node.data?.role||node.role||"viewable";
        $("modelMeta").textContent=`${currentModel.status||"-"} / ${role}`;
        fitAfterGeometryLoads();
        viewer.loadDocumentNode(doc,node).then(()=>{
          hideMessage();
          fitModelRepeatedly();
          resolve();
        }).catch(reject);
      },(code,message)=>reject(new Error(`Document.load failed: ${code||""} ${message||""}`)));
      viewer.addEventListener(Autodesk.Viewing.SELECTION_CHANGED_EVENT,event=>{
        const dbId=event.dbIdArray?.[0];
        if(!dbId){
          selectedProperties=[];
          renderProperties();
          return;
        }
        viewer.getProperties(dbId,result=>{
          selectedProperties=result.properties||[];
          renderProperties();
          $("drawer").classList.add("show");
        });
      });
    });
  });
}

function selectViewableNode(root){
  return root.search({type:"geometry",role:"3d"})?.[0]||
    root.search({type:"geometry",role:"2d"})?.[0]||
    root.getDefaultGeometry();
}

function applyMobileQuality(target){
  target.setQualityLevel?.(false,true);
  target.setGroundShadow?.(false);
  target.setGroundReflection?.(false);
  target.setTheme?.("light-theme");
  target.setLightPreset?.(0);
}

function fitAfterGeometryLoads(){
  const eventName=Autodesk.Viewing.GEOMETRY_LOADED_EVENT;
  const onGeometryLoaded=()=>{
    viewer.removeEventListener(eventName,onGeometryLoaded);
    fitModelRepeatedly();
  };
  viewer.addEventListener(eventName,onGeometryLoaded);
}

function fitModelRepeatedly(){
  [0,250,800,1600].forEach(delay=>{
    window.setTimeout(()=>{
      viewer?.resize?.();
      viewer?.fitToView?.();
      viewer?.impl?.invalidate?.(true,true,true);
    },delay);
  });
}

function showMessage(text){$("message").textContent=text;$("message").style.display="block"}
function hideMessage(){$("message").style.display="none"}

function renderProperties(){
  const props=$("props");
  const hint=$("propHint");
  props.innerHTML="";
  if(selectedProperties.length===0){
    hint.style.display="block";
    return;
  }
  hint.style.display="none";
  selectedProperties.slice(0,80).forEach(prop=>{
    const row=document.createElement("div");
    const dt=document.createElement("dt");
    const dd=document.createElement("dd");
    dt.textContent=prop.displayName||prop.attributeName||"-";
    dd.textContent=String(prop.displayValue??"-");
    row.append(dt,dd);
    props.append(row);
  });
}

function showFallback(model,reason){
  $("viewerHost").innerHTML=`<div class="fallback"><div class="fallback-card"><strong>Full Viewer did not open</strong><p>${escapeHtml(reason||"This mobile browser could not open the full Viewer.")}</p><p>Cloud preview is shown below.</p><img src="/api/models/${encodeURIComponent(model.id)}/thumbnail?size=1000" alt=""></div></div>`;
}

function escapeHtml(value){
  return String(value||"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[char]));
}

$("fitBtn").onclick=()=>fitModelRepeatedly();
$("propBtn").onclick=()=>$("drawer").classList.toggle("show");
$("shareBtn").onclick=async()=>{
  const data={title:currentModel?.name||"Model Viewer",url:location.href};
  if(navigator.share){
    await navigator.share(data).catch(()=>{});
  }else{
    await navigator.clipboard?.writeText(location.href);
    showMessage("Link copied.");
    setTimeout(hideMessage,1600);
  }
};
</script>
</body>
</html>
