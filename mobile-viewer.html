<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>工业模型查看</title>
<style>
:root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#f8fafc;background:#f7f9fc}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}.shell{display:grid;grid-template-rows:52px 1fr 58px;height:100%;background:#f7f9fc}
body.embedded .shell{grid-template-rows:1fr}body.embedded .topbar,body.embedded .bottombar{display:none}body.embedded .drawer{bottom:0}
.topbar,.bottombar{display:flex;align-items:center;gap:8px;background:#111827;border-color:#243244;color:#fff;padding:8px 10px;z-index:5}.topbar{border-bottom:1px solid #243244}.bottombar{border-top:1px solid #243244;justify-content:space-around}
.title{min-width:0;flex:1}.title strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px}.title span{display:block;color:#9ca3af;font-size:12px;margin-top:2px}
button,a.button{border:1px solid #334155;background:#172033;color:#fff;border-radius:8px;padding:8px 10px;text-decoration:none;font-size:13px}
#viewerHost{position:relative;min-height:0;background:#f7f9fc;touch-action:none}.msg{position:absolute;left:12px;right:12px;top:12px;background:rgba(255,255,255,.96);color:#172033;border:1px solid #dce7f5;border-radius:16px;padding:14px;z-index:4;line-height:1.55;box-shadow:0 16px 40px rgba(15,23,42,.14)}.msg strong{display:block;font-size:15px}.msg span{display:block;color:#64748b;font-size:13px;margin-top:4px}.msg em{display:inline-block;margin-top:10px;font-style:normal;color:#2563eb;background:#eff6ff;border-radius:999px;padding:5px 9px;font-size:12px}
.drawer{position:fixed;left:0;right:0;bottom:58px;max-height:52%;overflow:auto;background:#fff;color:#172033;border-radius:18px 18px 0 0;box-shadow:0 -14px 40px rgba(0,0,0,.28);padding:16px;z-index:10;transform:translateY(110%);transition:transform .2s ease}
.drawer.show{transform:translateY(0)}.drawer h2{font-size:17px;margin:0 0 4px}.drawer p{margin:0 0 12px;color:#64748b}.drawer dl{margin:0}.prop-section{margin-top:12px}.prop-section h3{font-size:13px;color:#2563eb;margin:0 0 6px}.drawer div.prop-row{display:grid;grid-template-columns:38% 1fr;gap:8px;border-top:1px solid #e5e7eb;padding:8px 0}.drawer dt{color:#64748b}.drawer dd{margin:0;word-break:break-word}
.fallback{display:grid;place-items:center;height:100%;padding:16px;background:#111827;color:#172033}.fallback-card{background:#fff;border-radius:12px;padding:16px;max-width:520px;width:100%}.fallback img{display:block;max-width:100%;height:auto;background:#fff;margin-top:12px}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <a class="button" href="/">返回</a>
    <div class="title"><strong id="modelName">工业模型查看</strong><span id="modelMeta">准备中...</span></div>
    <a class="button" href="/mobile-diagnostics">诊断</a>
  </header>
  <section id="viewerHost"><div class="msg" id="message"><strong>正在加载模型</strong><span>大模型加载可能需要一些时间，请保持页面停留。</span><em>云端 Viewer 初始化中</em></div></section>
  <nav class="bottombar">
    <button type="button" id="fitBtn">主视图</button>
    <button type="button" id="propBtn">构件属性</button>
    <button type="button" id="shareBtn">截图分享</button>
  </nav>
</main>
<aside class="drawer" id="drawer"><h2>构件属性</h2><p id="propHint">选择模型构件后查看属性，未选择时显示基础信息。</p><dl id="props"></dl></aside>
<script>
const VIEWER_VERSION="7.*";
const params=new URLSearchParams(location.search);
const modelId=params.get("id");
const isEmbedded=params.get("embedded")==="1";
let viewer=null;
let currentModel=null;
let selectedProperties=[];
const $=id=>document.getElementById(id);
if(isEmbedded) document.body.classList.add("embedded");

boot().catch(error=>{
  console.error(error);
  showMessage("打开失败",error.message||"Mobile Viewer failed to open.","请检查模型转换状态或网络连接。");
  if(currentModel) showFallback(currentModel,error.message);
});

async function boot(){
  if(!modelId) throw new Error("缺少模型 ID。");
  const modelPayload=await fetchJson(`/api/models/${encodeURIComponent(modelId)}`);
  currentModel=modelPayload.model;
  $("modelName").textContent=currentModel.name||"工业模型查看";
  $("modelMeta").textContent=`${currentModel.status||"-"} / ${currentModel.progress||"-"}`;
  if(!currentModel.urn) throw new Error("模型尚未完成转换。");
  if(!supportsWebGL()) throw new Error("当前浏览器不支持 WebGL。");
  showMessage("正在加载模型","大模型加载可能需要一些时间，请保持页面停留。","正在连接 Autodesk Viewer");
  await loadViewerAssets();
  showMessage("正在加载模型","正在获取查看授权并打开云端模型。","正在准备 Viewer");
  const token=await fetchJson("/api/auth/token");
  await openViewer(currentModel.urn,token.access_token);
}

async function fetchJson(url){
  const response=await fetch(url);
  const payload=await response.json().catch(()=>({}));
  if(!response.ok) throw new Error(payload.error||`Request failed: ${response.status}`);
  return payload;
}

function supportsWebGL(){
  try{
    const canvas=document.createElement("canvas");
    return Boolean(canvas.getContext("webgl2")||canvas.getContext("webgl"));
  }catch{return false}
}

function loadViewerAssets(){
  if(window.Autodesk?.Viewing) return Promise.resolve();
  return new Promise((resolve,reject)=>{
    const link=document.createElement("link");
    link.rel="stylesheet";
    link.href=`https://developer.api.autodesk.com/modelderivative/v2/viewers/${VIEWER_VERSION}/style.min.css`;
    document.head.appendChild(link);
    const script=document.createElement("script");
    script.src=`https://developer.api.autodesk.com/modelderivative/v2/viewers/${VIEWER_VERSION}/viewer3D.min.js`;
    script.onload=resolve;
    script.onerror=()=>reject(new Error("Autodesk Viewer 资源加载失败。"));
    document.body.appendChild(script);
  });
}

function openViewer(urn,accessToken){
  return new Promise((resolve,reject)=>{
    Autodesk.Viewing.Initializer({env:"AutodeskProduction2",api:"streamingV2",accessToken},()=>{
      const host=$("viewerHost");
      viewer=new Autodesk.Viewing.GuiViewer3D(host,{extensions:[]});
      const started=viewer.start();
      if(started>0){
        reject(new Error(`Viewer 初始化失败：${started}`));
        return;
      }
      applyMobileQuality(viewer);
      requestAnimationFrame(()=>viewer.resize());
      Autodesk.Viewing.Document.load(`urn:${urn}`,doc=>{
        const node=selectViewableNode(doc.getRoot());
        if(!node){
          reject(new Error("未找到可查看的二维图纸或三维模型。"));
          return;
        }
        const role=node.data?.role||node.role||"viewable";
        $("modelMeta").textContent=`${currentModel.status||"-"} / ${role}`;
        viewer.loadDocumentNode(doc,node).then(()=>{
          hideMessage();
          window.setTimeout(()=>restoreHomeViewOnce(),1200);
          resolve();
        }).catch(reject);
      },(code,message)=>reject(new Error(`模型文档加载失败：${code||""} ${message||""}`)));
      viewer.addEventListener(Autodesk.Viewing.SELECTION_CHANGED_EVENT,event=>{
        const dbId=event.dbIdArray?.[0];
        if(!dbId){
          selectedProperties=[];
          renderProperties();
          return;
        }
        viewer.getProperties(dbId,result=>{
          selectedProperties=result.properties||[];
          renderProperties();
          $("drawer").classList.add("show");
        });
      });
    });
  });
}

function selectViewableNode(root){
  return root.search({type:"geometry",role:"3d"})?.[0]||
    root.search({type:"geometry",role:"2d"})?.[0]||
    root.getDefaultGeometry();
}

function applyMobileQuality(target){
  target.setQualityLevel?.(false,true);
  target.setGroundShadow?.(false);
  target.setGroundReflection?.(false);
  target.setTheme?.("light-theme");
  target.setLightPreset?.(0);
}

function restoreHomeViewOnce(){
  viewer?.resize?.();
  viewer?.setViewFromFile?.();
  viewer?.navigation?.setRequestHomeView?.(true);
  viewer?.autocam?.goHome?.();
  viewer?.fitToView?.();
  viewer?.impl?.invalidate?.(true,true,true);
}

function showMessage(title,detail="",tag=""){
  $("message").innerHTML=`<strong>${escapeHtml(title)}</strong><span>${escapeHtml(detail)}</span>${tag?`<em>${escapeHtml(tag)}</em>`:""}`;
  $("message").style.display="block";
}
function hideMessage(){$("message").style.display="none"}

function renderProperties(){
  const props=$("props");
  const hint=$("propHint");
  props.innerHTML="";
  appendPropertySection("基础信息",[
    ["文件名称",currentModel?.name||"-"],
    ["转换状态",currentModel?.status||"-"],
    ["查看模式",$("modelMeta").textContent||"-"]
  ]);
  if(selectedProperties.length===0){
    hint.style.display="block";
    return;
  }
  hint.style.display="none";
  const groups=new Map();
  selectedProperties.slice(0,80).forEach(prop=>{
    const category=prop.displayCategory||"其他属性";
    if(!groups.has(category)) groups.set(category,[]);
    groups.get(category).push([prop.displayName||prop.attributeName||"-",String(prop.displayValue??"-")]);
  });
  groups.forEach((items,category)=>appendPropertySection(category,items));
}

function appendPropertySection(title,items){
  const props=$("props");
  const section=document.createElement("section");
  section.className="prop-section";
  const heading=document.createElement("h3");
  heading.textContent=title;
  section.append(heading);
  items.forEach(([name,value])=>{
    const row=document.createElement("div");
    row.className="prop-row";
    const dt=document.createElement("dt");
    const dd=document.createElement("dd");
    dt.textContent=name;
    dd.textContent=value;
    row.append(dt,dd);
    section.append(row);
  });
  props.append(section);
}

function showFallback(model,reason){
  $("viewerHost").innerHTML=`<div class="fallback"><div class="fallback-card"><strong>Viewer 未能打开</strong><p>${escapeHtml(reason||"当前移动端 WebView 无法打开完整 Viewer。")}</p><p>下方显示云端预览图。</p><img src="/api/models/${encodeURIComponent(model.id)}/thumbnail?size=1000" alt=""></div></div>`;
}

function escapeHtml(value){
  return String(value||"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[char]));
}

$("fitBtn").onclick=()=>restoreHomeViewOnce();
$("propBtn").onclick=()=>$("drawer").classList.toggle("show");
$("shareBtn").onclick=async()=>{
  const title=`分享工业模型：${currentModel?.name||"模型"}`;
  const text=`${currentModel?.name||"模型"}\n查看链接：${location.href}`;
  const data={title,text,url:location.href};
  if(navigator.share){
    await navigator.share(data).catch(()=>{});
  }else{
    await navigator.clipboard?.writeText(text);
    showMessage("分享链接已复制","已复制模型名称和查看链接。","截图分享");
    setTimeout(hideMessage,1600);
  }
};
</script>
</body>
</html>
