<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工业图纸模型查看</title>
  <style>
    :root{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f4f7fb}*{box-sizing:border-box}body{margin:0}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:#111c2a;color:#f8fbff;padding:22px}.brand{font-size:19px;font-weight:750;margin-bottom:6px}.muted{color:#7b8da4}.side .muted{color:#9fb0c3}.project-form{display:flex;gap:8px;margin:22px 0}.project-form input{min-width:0;flex:1;background:#1c2b3d;border:1px solid #35485f;color:#fff;padding:10px}.project-form button,.primary,.ghost{border:1px solid #cbd8e6;background:#fff;color:#172033;padding:10px 13px;cursor:pointer}.projects{display:grid;gap:8px}.project{border:1px solid #31445c;background:#182638;color:#e8f1fb;text-align:left;padding:12px;cursor:pointer}.project.active{border-color:#67a5ff;background:#213957}.main{padding:26px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}.top h1{margin:0 0 8px;font-size:28px}.pill{display:inline-flex;background:#dff7ea;color:#08704e;font-weight:700;padding:6px 10px;font-size:12px}.upload{border:1px dashed #b9c7d8;background:#fff;padding:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}.card{background:#fff;border:1px solid #dde6f0;padding:18px}.card strong{display:block;font-size:26px;margin-top:6px}.table{background:#fff;border:1px solid #dde6f0;overflow:auto}table{width:100%;border-collapse:collapse;min-width:860px}th,td{border-bottom:1px solid #e7edf5;text-align:left;padding:13px}th{color:#607188;background:#fbfcfe;font-size:12px}.actions{display:flex;gap:8px}.actions button{border:1px solid #d8e2ee;background:#fff;padding:7px 10px;cursor:pointer}.danger{color:#a3261d}.error{background:#fff1f0;border:1px solid #ffcaca;color:#9b1c1c;padding:12px;margin-bottom:14px}.viewer{position:fixed;inset:0;background:#0f1722;display:none;grid-template-rows:54px 1fr;z-index:20}.viewer.show{display:grid}.toolbar{display:flex;align-items:center;gap:12px;background:#111827;color:#fff;padding:0 16px}.viewer-host{position:relative}.viewer-host .msg{position:absolute;left:20px;top:20px;background:#fff;padding:10px 12px;z-index:2}@media(max-width:850px){.app{grid-template-columns:1fr}.side{min-height:auto}.top,.upload{flex-direction:column}.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">工业图纸模型查看</div>
      <div class="muted">Cloudflare + APS Viewer</div>
      <form class="project-form" id="projectForm">
        <input id="projectName" placeholder="新项目名称" />
        <button type="submit">创建</button>
      </form>
      <div class="projects" id="projects"></div>
    </aside>
    <main class="main">
      <section class="top">
        <div><h1 id="title">项目</h1><p class="muted">上传二维图纸和三维模型，转换完成后查看、旋转、缩放、测量和检查构件属性。</p></div>
        <span class="pill">APS 云端转换</span>
      </section>
      <div id="error"></div>
      <section class="cards">
        <div class="card"><span class="muted">文件总数</span><strong id="total">0</strong></div>
        <div class="card"><span class="muted">转换完成</span><strong id="done">0</strong></div>
        <div class="card"><span class="muted">转换中</span><strong id="working">0</strong></div>
      </section>
      <section class="upload">
        <div><strong>上传图纸或模型</strong><div class="muted" id="phase">支持 DWG、DXF、RVT、IFC、STEP、NWD、OBJ、STL、ZIP 等格式</div></div>
        <input id="fileInput" type="file" hidden />
        <button class="primary" id="pickFile">选择文件</button>
      </section>
      <section class="table"><table><thead><tr><th>文件名</th><th>状态</th><th>进度</th><th>URN</th><th>操作</th></tr></thead><tbody id="models"></tbody></table></section>
    </main>
  </div>
  <section class="viewer" id="viewer"><div class="toolbar"><button class="ghost" id="closeViewer">返回</button><strong id="viewerTitle">模型查看</strong></div><div class="viewer-host" id="viewerHost"><div class="msg" id="viewerMsg">正在加载 Viewer</div></div></section>
<script>
const state={projects:[],activeId:null,viewer:null};
const $=id=>document.getElementById(id);
function showError(msg){$('error').innerHTML=msg?`<div class="error">${msg}</div>`:''}
async function api(path,opt={}){const r=await fetch(path,{...opt,headers:{...(opt.body instanceof FormData?{}:{'Content-Type':'application/json'}),...(opt.headers||{})}});const p=await r.json().catch(()=>({}));if(!r.ok)throw new Error(p.error||`Request failed: ${r.status}`);return p}
async function load(){showError('');try{const p=await api('/api/projects');state.projects=p.projects;state.activeId=state.activeId||p.projects[0]?.id||null;render()}catch(e){showError(e.message)}}
function active(){return state.projects.find(p=>p.id===state.activeId)||state.projects[0]}
function render(){const p=active();$('projects').innerHTML=state.projects.map(x=>`<button class="project ${x.id===p?.id?'active':''}" onclick="selectProject('${x.id}')"><strong>${x.name}</strong><br><span class="muted">${x.models.length} 个文件</span></button>`).join('')||'<p class="muted">暂无项目</p>';$('title').textContent=p?.name||'请先创建项目';const models=p?.models||[];$('total').textContent=models.length;$('done').textContent=models.filter(m=>m.status==='success').length;$('working').textContent=models.filter(m=>['inprogress','pending','not_started','unknown','pending_upload'].includes(m.status)).length;$('models').innerHTML=models.map(m=>`<tr><td>${m.name}</td><td>${m.status}</td><td>${m.progress||'-'}</td><td><code>${m.urn||'-'}</code></td><td><div class="actions"><button onclick="refreshStatus('${m.id}')">刷新</button><button onclick="openViewer('${m.id}')" ${m.urn?'':'disabled'}>打开</button><button class="danger" onclick="deleteModel('${m.id}')">删除</button></div></td></tr>`).join('')||'<tr><td colspan="5" class="muted">暂无文件</td></tr>'}
window.selectProject=id=>{state.activeId=id;render()}
$('projectForm').onsubmit=async e=>{e.preventDefault();const name=$('projectName').value.trim();if(!name)return;try{const r=await api('/api/projects',{method:'POST',body:JSON.stringify({name})});$('projectName').value='';state.activeId=r.project.id;await load()}catch(err){showError(err.message)}};
$('pickFile').onclick=()=>$('fileInput').click();
$('fileInput').onchange=async e=>{const file=e.target.files[0];const p=active();if(!file||!p)return;try{$('phase').textContent='正在申请 Autodesk 直传地址';const init=await api('/api/models/init-upload',{method:'POST',body:JSON.stringify({projectId:p.id,fileName:file.name,size:file.size,contentType:file.type||'application/octet-stream'})});$('phase').textContent='正在直传到 Autodesk OSS';await uploadSigned(init.upload.urls||[init.upload.url],file);$('phase').textContent='正在启动模型转换';await api(`/api/models/${init.model.id}/complete-upload`,{method:'POST',body:'{}'});$('phase').textContent='已提交转换';await load()}catch(err){showError(err.message)}finally{e.target.value=''}};
async function uploadSigned(urls,file){if(urls.length===1){const r=await fetch(urls[0],{method:'PUT',headers:{'Content-Type':'application/octet-stream'},body:file});if(!r.ok)throw new Error('上传 Autodesk OSS 失败');return}const size=Math.ceil(file.size/urls.length);for(let i=0;i<urls.length;i++){const r=await fetch(urls[i],{method:'PUT',headers:{'Content-Type':'application/octet-stream'},body:file.slice(i*size,Math.min(file.size,(i+1)*size))});if(!r.ok)throw new Error('分片上传失败')}}
window.refreshStatus=async id=>{try{await api(`/api/models/${id}/status`);await load()}catch(e){showError(e.message)}};
window.deleteModel=async id=>{if(!confirm('确定删除这个文件记录吗？'))return;try{await fetch(`/api/models/${id}`,{method:'DELETE'});await load()}catch(e){showError(e.message)}};
async function loadViewerAssets(){if(window.Autodesk?.Viewing)return;await new Promise((res,rej)=>{const css=document.createElement('link');css.rel='stylesheet';css.href='https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css';document.head.appendChild(css);const s=document.createElement('script');s.src='https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js';s.onload=res;s.onerror=()=>rej(new Error('APS Viewer CDN 加载失败'));document.body.appendChild(s)})}
window.openViewer=async id=>{try{const m=(await api(`/api/models/${id}`)).model;$('viewer').classList.add('show');$('viewerTitle').textContent=m.name;$('viewerMsg').style.display='block';await loadViewerAssets();const token=await api('/api/auth/token');Autodesk.Viewing.Initializer({env:'AutodeskProduction2',api:'streamingV2',accessToken:token.access_token},()=>{if(state.viewer)state.viewer.finish();state.viewer=new Autodesk.Viewing.GuiViewer3D($('viewerHost'),{extensions:['Autodesk.Measure','Autodesk.Section']});state.viewer.start();Autodesk.Viewing.Document.load(`urn:${m.urn}`,doc=>{state.viewer.loadDocumentNode(doc,doc.getRoot().getDefaultGeometry()).then(()=>$('viewerMsg').style.display='none')},()=>showError('Viewer 加载失败'))})}catch(e){showError(e.message)}};
$('closeViewer').onclick=()=>{$('viewer').classList.remove('show');if(state.viewer){state.viewer.finish();state.viewer=null}};
load();setInterval(()=>{const p=active();if(p?.models.some(m=>['inprogress','pending','not_started','unknown'].includes(m.status)))load()},6000);
</script>
</body>
</html>
